# Get editor completions based on the config schema
# "$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
#add_newline = true

# Replace the '❯' symbol in the prompt with '➜'
#[character] # The name of the module we are configuring is 'character'
#success_symbol = '[→➜](bold green)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'

# Disable the package module, hiding it from the prompt completely
#[package]
#disabled = true

# Everforest-inspired (medium) palette applied to prompt segments.
# Accent / light green: #A7C080
# Accent light (for highlights): #CFE6C1
# Accent dark / connector: #7C9B70
# Muted mid tone (segment mid): #3B4B44
# Deep background segments: #26302C, #1B2623
# Foreground text: #E6EFE3
# Muted text: #9DAF9E

format = """
[░▒▓](#CFE6C1)\
[ 💻 ](bg:#CFE6C1 fg:#16221B)\
[](bg:#7C9B70 fg:#CFE6C1)\
$directory\
[](fg:#7C9B70 bg:#3B4B44)\
$git_branch\
$git_status\
[](fg:#3B4B44 bg:#26302C)\
$nodejs\
$rust\
$golang\
$php\
[](fg:#26302C bg:#1B2623)\
$time\
[ ](fg:#1B2623)\
\n$character"""

[directory]
style = "fg:#16221B bg:#7C9B70"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#3B4B44"
format = '[[ $symbol $branch ](fg:#CFE6C1 bg:#3B4B44)]($style)'

[git_status]
style = "bg:#3B4B44"
format = '[[($all_status$ahead_behind )](fg:#CFE6C1 bg:#3B4B44)]($style)'

[nodejs]
symbol = ""
style = "bg:#26302C"
format = '[[ $symbol ($version) ](fg:#CFE6C1 bg:#26302C)]($style)'

[rust]
symbol = ""
style = "bg:#26302C"
format = '[[ $symbol ($version) ](fg:#CFE6C1 bg:#26302C)]($style)'

[golang]
symbol = ""
style = "bg:#26302C"
format = '[[ $symbol ($version) ](fg:#CFE6C1 bg:#26302C)]($style)'

[php]
symbol = ""
style = "bg:#26302C"
format = '[[ $symbol ($version) ](fg:#CFE6C1 bg:#26302C)]($style)'

[time]
disabled = false
time_format = "%Y-%m-%dT%H:%M UTC%:z" # Hour:Minute Format
style = "bg:#1B2623"
format = '[[  $time ](fg:#9DAF9E bg:#1B2623)]($style)'
